apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: upgrade-readywhen-empty
spec:
  schema:
    apiVersion: v1alpha1
    kind: UpgradeReadyEmpty
    spec:
      name: string
    status: {}
  resources:
  - id: configmap
    readyWhen: []
    template:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ${schema.spec.name}-configmap
        namespace: ${schema.metadata.namespace}
      data:
        test: readywhen-empty
