# Kind Controller
#
# The bootstrap root. A Graph that implements the Kind type. Creates the
# Kind CRD, watches all Kinds, creates a CRD per Kind, watches instances
# of each Kind, and creates per-instance Graphs.
#
# Convention: inside a Kind's per-instance Graph, `schema` is the scope
# variable (the resource itself). User nodes reference ${schema.spec.foo}.
---
apiVersion: experimental.kro.run/v1alpha1
kind: Graph
metadata:
  name: kind
  namespace: kro-system
spec:
  nodes:
    - id: kindCrd
      template:
        apiVersion: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        metadata:
          name: kinds.experimental.kro.run
        spec:
          group: experimental.kro.run
          names:
            plural: kinds
            singular: kind
            kind: Kind
            listKind: KindList
          scope: Cluster
          versions:
            - name: v1alpha1
              served: true
              storage: true
              schema:
                openAPIV3Schema: >-
                  ${simpleSchema.toOpenAPI({"types": {"Node": {"id": "string", "template": "any", "patch": "any", "ref": "any", "watch": "any", "def": "any", "forEach": "[]map[string]string", "finalizes": "string", "includeWhen": "[]string", "readyWhen": "[]string", "propagateWhen": "[]string"}, "PrinterColumn": {"name": "string | required=true", "type": "string | required=true", "jsonPath": "string | required=true", "description": "string", "format": "string", "priority": "integer"}}, "spec": {"kind": "string", "group": "string", "version": "string", "scope": "string | default=Namespaced", "schema": {"spec": "object", "status": "object", "types": "object"}, "nodes": "[]Node", "additionalPrinterColumns": "[]PrinterColumn"}, "status": {"ready": "boolean", "items": "integer"}}, [])}
              subresources:
                status: {}
              additionalPrinterColumns:
                - name: Kind
                  type: string
                  jsonPath: .spec.kind
                - name: Group
                  type: string
                  jsonPath: .spec.group
                - name: Scope
                  type: string
                  jsonPath: .spec.scope
                - name: Ready
                  type: boolean
                  jsonPath: .status.ready
                - name: Items
                  type: integer
                  jsonPath: .status.items
                - name: Age
                  type: date
                  jsonPath: .metadata.creationTimestamp

    - id: watchKinds
      includeWhen:
        - ${has(kindCrd.status) && has(kindCrd.status.conditions) && kindCrd.status.conditions.exists(c, c.type == 'Established' && c.status == 'True')}
      # No metadata.namespace: watch Kinds across all namespaces
      # (k8s list/watch semantics — absent namespace = all).
      watch:
        apiVersion: experimental.kro.run/v1alpha1
        kind: Kind
        selector: {}

    - id: controllers
      forEach:
        - k: ${watchKinds}
      template:
        apiVersion: experimental.kro.run/v1alpha1
        kind: Graph
        metadata:
          name: kind-${k.metadata.name}
          namespace: kro-system
        spec:
          nodes:
            - id: k
              ref:
                apiVersion: experimental.kro.run/v1alpha1
                kind: Kind
                metadata:
                  name: ${k.metadata.name}

            - id: crd
              template:
                apiVersion: apiextensions.k8s.io/v1
                kind: CustomResourceDefinition
                metadata:
                  name: $${plural(k.spec.kind).lowerAscii()}.$${k.spec.group}
                spec:
                  group: $${k.spec.group}
                  names:
                    kind: $${k.spec.kind}
                    plural: $${plural(k.spec.kind).lowerAscii()}
                  scope: $${k.spec.scope}
                  versions:
                    - name: $${k.spec.version}
                      served: true
                      storage: true
                      subresources:
                        status: {}
                      schema:
                        openAPIV3Schema: $${simpleSchema.toOpenAPI(k.spec.schema, k.spec.nodes)}
                      additionalPrinterColumns: '$${has(k.spec.additionalPrinterColumns) ? k.spec.additionalPrinterColumns : []}'

            - id: watchInstances
              includeWhen:
                - $${has(crd.status) && has(crd.status.conditions) && crd.status.conditions.exists(c, c.type == 'Established' && c.status == 'True')}
              # No metadata.namespace: watch items of this Kind
              # across all namespaces (k8s list/watch semantics —
              # absent namespace = all).
              watch:
                apiVersion: $${k.spec.group}/$${k.spec.version}
                kind: $${k.spec.kind}
                metadata:
                  selector: {}

            - id: instances
              forEach:
                - instance: $${watchInstances}
              template:
                apiVersion: experimental.kro.run/v1alpha1
                kind: Graph
                metadata:
                  name: >-
                    $${(has(instance.metadata.namespace) && instance.metadata.namespace != ""
                    ? instance.metadata.namespace + "-" : "")
                    + instance.metadata.name + "-" + k.spec.kind.lowerAscii()}
                spec:
                  nodes: >-
                    $${
                      [{"id": "schema", "ref": {
                        "apiVersion": k.spec.group + "/" + k.spec.version,
                        "kind": k.spec.kind,
                        "metadata": {
                          "name": instance.metadata.name,
                          "namespace": has(instance.metadata.namespace) ? instance.metadata.namespace : ""
                        }
                      }}]
                      + k.spec.nodes
                    }

            - id: kindStatus
              patch:
                apiVersion: experimental.kro.run/v1alpha1
                kind: Kind
                metadata:
                  name: $${k.metadata.name}
                status:
                  ready: true
                  items: $${watchInstances.size()}
