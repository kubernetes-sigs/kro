apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: portapp.kro.run
spec:
  schema:
    apiVersion: v1alpha1
    kind: PortApp
    spec:
      name: string
      namespace: string | default=default
      # Simple approach: define containers as nested object, then make it an array
      container:
        name: string | required=true
        image: string | required=true
        port: integer | required=true
  resources:
    - id: configmap
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
        data:
          containerName: ${schema.spec.container.name}
