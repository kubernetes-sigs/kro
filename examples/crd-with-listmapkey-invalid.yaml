apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: badcontainerconfigs.test.kro.run
spec:
  group: test.kro.run
  names:
    kind: BadContainerConfig
    plural: badcontainerconfigs
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                containers:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - name
                    - optionalPort
                  items:
                    type: object
                    required:
                      - name
                    # NOTE: optionalPort is NOT in required list!
                    properties:
                      name:
                        type: string
                      image:
                        type: string
                      optionalPort:
                        type: integer
