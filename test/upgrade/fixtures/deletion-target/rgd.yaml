apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: upgrade-deletion-target
spec:
  schema:
    apiVersion: v1alpha1
    kind: UpgradeDeletionTarget
    spec:
      name: string
    status: {}
  resources:
  - id: configmap
    template:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ${schema.spec.name}-configmap
        namespace: ${schema.metadata.namespace}
      data:
        test: deletion-target
