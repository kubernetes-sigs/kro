# 3. A Graph that implements ResourceGraphDefinition
#
# This implements the full RGD system. It creates the RGD CRD, watches all
# RGDs, and creates example 2 for each one (along with its CRD).
# Each level is its own scope:
#
#   rgd-implementation (L0)           — creates the RGD CRD, watches all RGDs
#   └─ <rgd-name> (L1)               — creates the kind CRD, watches instances
#      └─ <instance>-<kind> (L2)     — owns resources, contributes status
#
# Wrapper Graph pattern is applied at both forEach levels:
#   - L1 reads its specific RGD via watch(name) — O(1) reactive
#   - L2 reads its specific instance via watch(name) — O(1) reactive
#
# L1 constructs L2's resource list via CEL list concatenation:
#   [schema watch] + rgd.spec.resources + [status contribution]
# The expressions inside rgd.spec.resources (like ${schema.spec.image})
# survive as data through L1's CEL evaluation and are evaluated by L2.
# This works because the evaluation model never re-scans CEL output —
# the strings are opaque data until L2's controller processes its own spec.
#
# Escaping depth by target level (from L0 source):
#   ${...}      — L0 evaluates (e.g. forEach variable, baked-in names)
#   $${...}     — L1 evaluates (e.g. RGD schema fields, CEL list append)
# ---------------------------------------------------------------------------
apiVersion: kro.run/v1alpha1
kind: Graph
metadata:
  name: rgd-implementation # (L0)
spec:
  nodes:
    # Create the ResourceGraphDefinition CRD itself.
    - id: rgdCrd
      template:
        apiVersion: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        metadata:
          name: resourcegraphdefinitions.experimental.kro.run
        spec:
          group: experimental.kro.run
          names:
            kind: ResourceGraphDefinition
            listKind: ResourceGraphDefinitionList
            plural: resourcegraphdefinitions
            singular: resourcegraphdefinition
            shortNames:
              - rgd
          scope: Cluster
          versions:
            - name: v1alpha1
              served: true
              storage: true
              subresources:
                status: {}
              schema:
                openAPIV3Schema: >-
                  ${simpleSchema.toOpenAPI({
                    "types": {
                      "validation": {"expression": "string", "message": "string"},
                      "printerColumn": {"name": "string", "type": "string", "jsonPath": "string"},
                      "schemaDefinition": {
                        "kind": "string | required=true",
                        "apiVersion": "string | required=true",
                        "group": "string | default=experimental.kro.run",
                        "spec": "object",
                        "types": "object",
                        "status": "object",
                        "validation": "[]validation",
                        "additionalPrinterColumns": "[]printerColumn"
                      },
                      "resource": {
                        "id": "string",
                        "template": "object",
                        "readyWhen": "[]string",
                        "includeWhen": "[]string",
                        "forEach": "map[string]string",
                        "propagateWhen": "[]string"
                      },
                      "condition": {
                        "type": "string", "status": "string", "reason": "string",
                        "message": "string", "lastTransitionTime": "string",
                        "observedGeneration": "integer"
                      },
                      "resourceStatus": {"id": "string", "dependencies": "[]resourceDependency"},
                      "resourceDependency": {"id": "string"}
                    },
                    "spec": {
                      "schema": "schemaDefinition",
                      "resources": "[]resource",
                      "defaultServiceAccounts": "map[string]string"
                    },
                    "status": {
                      "state": "string | enum=Active,Inactive",
                      "topologicalOrder": "[]string",
                      "conditions": "[]condition",
                      "resources": "[]resourceStatus"
                    }
                  }, [])}

    # Watch all RGDs
    - id: watchRgds
      template:
        apiVersion: experimental.kro.run/v1alpha1
        kind: ResourceGraphDefinition
        metadata:
          selector: {}

    # For each RGD, create its controller Graph.
    - id: controllers
      forEach:
        rgd: ${watchRgds}
      template:
        apiVersion: kro.run/v1alpha1
        kind: Graph
        metadata:
          name: ${rgd.metadata.name} # (L1)
        spec:
          nodes:
            # Read the specific RGD fresh. L0 bakes in the name;
            # L1 reads it fresh to stay reactive to spec changes.
            - id: rgd
              template:
                apiVersion: experimental.kro.run/v1alpha1
                kind: ResourceGraphDefinition
                metadata:
                  name: ${rgd.metadata.name}

            # Create the CRD from the RGD schema.
            # $${...} defers to L1, which evaluates against its own "rgd".
            - id: crd
              template:
                apiVersion: apiextensions.k8s.io/v1
                kind: CustomResourceDefinition
                metadata:
                  name: $${plural(rgd.spec.schema.kind).lowerAscii()}.$${rgd.spec.schema.group}
                spec:
                  group: $${rgd.spec.schema.group}
                  names:
                    kind: $${rgd.spec.schema.kind}
                    plural: $${plural(rgd.spec.schema.kind).lowerAscii()}
                  scope: Namespaced
                  versions:
                    - name: $${rgd.spec.schema.apiVersion}
                      served: true
                      storage: true
                      subresources:
                        status: {}
                      schema:
                        openAPIV3Schema: $${simpleSchema.toOpenAPI(rgd.spec.schema, rgd.spec.resources)}

            # Watch all instances of the kind
            - id: watchInstances
              template:
                apiVersion: $${rgd.spec.schema.group}/$${rgd.spec.schema.apiVersion}
                kind: $${rgd.spec.schema.kind}
                metadata:
                  selector: {}

            # One Graph per instance — wrapper Graph pattern.
            # L1 has "rgd" (watch) and "instance" (forEach var)
            # in scope, so it constructs L2's full resource list via CEL:
            #   [schema watch] + rgd.spec.resources + [status entry]
            # The ${...} expressions inside rgd.spec.resources survive as
            # string data through CEL and are evaluated by L2's controller.
            - id: instances
              forEach:
                instance: $${watchInstances}
              template:
                apiVersion: kro.run/v1alpha1
                kind: Graph
                metadata:
                  name: $${instance.metadata.name}-$${rgd.spec.schema.kind.lowerAscii()} # (L2)
                spec:
                  nodes: >-
                    $${
                      [{"id": "schema", "template": {
                        "apiVersion": rgd.spec.schema.group + "/" + rgd.spec.schema.apiVersion,
                        "kind": rgd.spec.schema.kind,
                        "metadata": {
                          "name": instance.metadata.name,
                          "namespace": instance.metadata.namespace
                        }
                      }}]
                      + rgd.spec.resources
                      + [{"id": "status", "template": {
                        "apiVersion": rgd.spec.schema.group + "/" + rgd.spec.schema.apiVersion,
                        "kind": rgd.spec.schema.kind,
                        "metadata": {
                          "name": instance.metadata.name,
                          "namespace": instance.metadata.namespace
                        },
                        "status": rgd.spec.schema.status
                      }}]
                    }

            # Contribute status back to the RGD
            - id: rgdStatus
              template:
                apiVersion: experimental.kro.run/v1alpha1
                kind: ResourceGraphDefinition
                metadata:
                  name: $${rgd.metadata.name}
                status:
                  state: $${crd.status.conditions.exists(c, c.type == 'Established' && c.status == 'True') ? 'Active':'Inactive'}
