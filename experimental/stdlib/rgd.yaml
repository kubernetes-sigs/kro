# ResourceGraphDefinition — backwards-compatible alias for Kind.
#
# Maps the upstream kro API shape (spec.schema + spec.resources) to
# the same infrastructure Kind uses: CRD creation, instance watching,
# per-instance Graphs. The `schema` scope variable works identically.
---
apiVersion: experimental.kro.run/v1alpha1
kind: Kind
metadata:
  name: resourcegraphdefinition
  namespace: kro-system
spec:
  kind: ResourceGraphDefinition
  group: kro.run
  version: v1alpha1
  scope: Cluster
  schema:
    types:
      ExternalRefMetadata:
        name: string
        namespace: string
        selector: object
      ExternalRef:
        apiVersion: string
        kind: string
        metadata: ExternalRefMetadata
      Resource:
        id: string | required=true
        template: object
        externalRef: ExternalRef
        readyWhen: "[]string"
        includeWhen: "[]string"
        forEach: "[]map[string]string"
    spec:
      schema:
        kind: string
        apiVersion: string
        group: string | default=kro.run
        scope: string | default=Namespaced
        spec: object
        status: object
      resources: "[]Resource"
  nodes:
    - id: crd
      template:
        apiVersion: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        metadata:
          name: ${plural(schema.spec.schema.kind).lowerAscii()}.${schema.spec.schema.group}
          labels: '${has(schema.spec.schema.metadata) && has(schema.spec.schema.metadata.labels) ? schema.spec.schema.metadata.labels : {}}'
          annotations: '${has(schema.spec.schema.metadata) && has(schema.spec.schema.metadata.annotations) ? schema.spec.schema.metadata.annotations : {}}'
        spec:
          group: ${schema.spec.schema.group}
          names:
            kind: ${schema.spec.schema.kind}
            plural: ${plural(schema.spec.schema.kind).lowerAscii()}
          scope: ${schema.spec.schema.scope}
          versions:
            - name: ${schema.spec.schema.apiVersion}
              served: true
              storage: true
              subresources:
                status: {}
              schema:
                openAPIV3Schema: ${simpleSchema.toOpenAPI(schema.spec.schema, schema.spec.resources)}

    - id: watchInstances
      includeWhen:
        - ${has(crd.status) && has(crd.status.conditions) && crd.status.conditions != null && crd.status.conditions.exists(c, c.type == 'Established' && c.status == 'True')}
      # No metadata.namespace: watch custom resource instances across all
      # namespaces (k8s list/watch semantics — absent namespace = all).
      template:
        apiVersion: ${schema.spec.schema.group}/${schema.spec.schema.apiVersion}
        kind: ${schema.spec.schema.kind}
        metadata:
          selector: {}

    - id: instances
      forEach:
        - instance: ${watchInstances}
      template:
        apiVersion: experimental.kro.run/v1alpha1
        kind: Graph
        metadata:
          # Per-instance Graph lives in the instance's namespace (or
          # kro-system for cluster-scoped instances). Resources inside
          # the Graph default to the Graph's namespace — matches upstream
          # kro's behavior (resources in instance's namespace).
          name: '${(has(instance.metadata.namespace) && instance.metadata.namespace != "" ? instance.metadata.namespace + "-" : "") + instance.metadata.name + "-" + schema.spec.schema.kind.lowerAscii()}'
          namespace: '${has(instance.metadata.namespace) && instance.metadata.namespace != "" ? instance.metadata.namespace : "kro-system"}'
        spec:
          # Per-instance Graph nodes: schema watch + user resources + status.
          #
          # Single status node computes state from observed resource readiness.
          # No propagateWhen gate — the node always fires, and the CEL ternary
          # produces the correct value: ACTIVE when all resources are ready,
          # IN_PROGRESS otherwise. Apply-hash changes only on state transitions,
          # so steady-state reconciles are no-ops.
          #
          # The readiness check is built dynamically: for each resource in the
          # RGD spec, generate "${<id>.ready()}" and join with " && ". Empty
          # resource lists produce "true" (vacuously ready).
          #
          # propagateWhen injection:
          #   The upstream controller gates on readyWhen; the Graph controller uses
          #   propagateWhen for the same purpose. The .map() injects propagateWhen
          #   into every resource — resources with readyWhen get that expression,
          #   resources without get ["true"] (always-ready, but still classified as
          #   managed rather than watch-only).
          #
          # rgdInstanceStatus.readyWhen:
          #   Load-bearing for DAG construction, not just readiness reporting.
          #   extractFieldPathsFromAST skips .ready() calls in template strings —
          #   it only registers them via gate expressions (readyWhen / propagateWhen).
          #   Without this gate, rgdInstanceStatus would have zero Dependencies
          #   and dispatch BEFORE upstream resources exist in scope, failing
          #   "data pending" forever. The gate is also semantically correct:
          #   the instance is Ready iff every managed resource is Ready.
          #
          #   Do not "simplify" by folding .ready() calls into the template and
          #   dropping this gate — the DAG bug survives until upstream fixes it.
          #   Tracking: https://github.com/kubernetes-sigs/kro/issues/1256
          nodes: >-
            ${
              [{"id": "schema", "template": {
                "apiVersion": schema.spec.schema.group + "/" + schema.spec.schema.apiVersion,
                "kind": schema.spec.schema.kind,
                "metadata": {
                  "name": instance.metadata.name,
                  "namespace": instance.metadata.namespace
                }
              }}]
              + schema.spec.resources.map(r, r.merge({"propagateWhen": has(r.readyWhen) ? r.readyWhen : ["true"]}))
              + [{"id": "rgdInstanceStatus",
                 "readyWhen": (schema.spec.resources.size() == 0 ? ["${true}"] : schema.spec.resources.map(r, "${" + r.id + ".ready()}")),
                 "template": {
                "apiVersion": schema.spec.schema.group + "/" + schema.spec.schema.apiVersion,
                "kind": schema.spec.schema.kind,
                "metadata": {
                  "name": instance.metadata.name,
                  "namespace": instance.metadata.namespace
                },
                "status": {
                  "state": "${" + (schema.spec.resources.size() == 0 ? "true" : schema.spec.resources.map(r, r.id + ".ready()").join(" && ")) + " ? 'ACTIVE' : 'IN_PROGRESS'}",
                  "conditions": [
                    {
                      "type": "Ready",
                      "status": "${" + (schema.spec.resources.size() == 0 ? "true" : schema.spec.resources.map(r, r.id + ".ready()").join(" && ")) + " ? 'True' : 'False'}",
                      "reason": "Ready",
                      "observedGeneration": instance.metadata.generation,
                      "lastTransitionTime": instance.metadata.creationTimestamp
                    }
                  ]
                }.merge(has(schema.spec.schema.status) ? schema.spec.schema.status : {})
              }}]
            }

    - id: rgdStatus
      propagateWhen:
        - ${crd.ready()}
      template:
        apiVersion: kro.run/v1alpha1
        kind: ResourceGraphDefinition
        metadata:
          name: ${schema.metadata.name}
        status:
          state: Active
          topologicalOrder: '${schema.spec.resources.map(r, r.id)}'
          # Minimal condition set for upstream compat. Tests check for:
          #   - Ready=True (root condition)
          #   - GraphAccepted=True
          # Exact-message checks (rgd_conditions_test) require upstream
          # controller internals (revision counters, specific reason strings)
          # that the stdlib cannot synthesize from CEL — those tests are out
          # of scope for this compat layer.
          conditions:
            - type: Ready
              status: "True"
              reason: Ready
              observedGeneration: ${schema.metadata.generation}
              lastTransitionTime: ${schema.metadata.creationTimestamp}
            - type: GraphAccepted
              status: "True"
              reason: Valid
              message: resource graph and schema are valid
              observedGeneration: ${schema.metadata.generation}
              lastTransitionTime: ${schema.metadata.creationTimestamp}
            - type: KindReady
              status: "True"
              reason: Ready
              observedGeneration: ${schema.metadata.generation}
              lastTransitionTime: ${schema.metadata.creationTimestamp}
            - type: ControllerReady
              status: "True"
              reason: Running
              message: controller is running
              observedGeneration: ${schema.metadata.generation}
              lastTransitionTime: ${schema.metadata.creationTimestamp}
