# Singleton — declare a resource that should exist exactly once.
#
# A Kind whose per-instance Graph watches all Singletons and
# self-determines if it is the claim holder. Only the holder creates
# the target resource (via includeWhen gate).
#
# Priority resolution: highest spec.priority holds the claim. Ties
# broken by lexicographically lowest metadata.name.
#
# Failover: when the holding Singleton is deleted, its per-instance
# Graph is torn down (target resource deleted). The remaining
# per-instance Graphs re-evaluate, and the next holder creates the
# resource.
#
# Complexity: each per-instance Graph watches all Singletons (O(N²)
# reconciliations per change). Acceptable — Singleton cardinality is
# small (typically 2-5 competing declarations per target resource).
#
# Per-instance Graph nodes:
#   - schema:      the Singleton instance (auto-injected by Kind controller)
#   - singletons:  WatchKind on all Singletons
#   - identities:  flatten each singleton to {name, priority, identity}
#   - identity:    this Singleton's target identity
#   - peers:       singletons targeting the same resource
#   - holder:      highest priority peer (stable sort, take first)
#   - target:      the actual resource, only created if this Singleton holds
# ─────────────────────────────────────────────────────────────────────
apiVersion: experimental.kro.run/v1alpha1
kind: Kind
metadata:
  name: singleton
spec:
  kind: Singleton
  group: experimental.kro.run
  version: v1alpha1
  additionalPrinterColumns:
    - name: Claim
      type: string
      jsonPath: .status.claim
    - name: Priority
      type: integer
      jsonPath: .spec.priority
    - name: Active
      type: boolean
      jsonPath: .status.active
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  schema:
    spec:
      priority: integer | default=0
      template: object
    status:
      active: boolean
      claim: string
  nodes:
    - id: singletons
      watch:
        apiVersion: experimental.kro.run/v1alpha1
        kind: Singleton
        selector: {}

    # Flatten each singleton into {name, priority, identity}.
    # The identity formula appears exactly once.
    - id: identities
      forEach:
        - s: ${singletons}
      def:
        name: ${s.metadata.name}
        priority: ${s.spec.priority}
        identity: >-
          ${s.spec.template.apiVersion + "/" + s.spec.template.kind + "/"
            + s.spec.template.metadata.namespace + "/" + s.spec.template.metadata.name}

    # This Singleton's target identity — same formula as identities.
    - id: identity
      def:
        value: >-
          ${schema.spec.template.apiVersion + "/" + schema.spec.template.kind + "/"
            + schema.spec.template.metadata.namespace + "/" + schema.spec.template.metadata.name}

    # Peers — singletons targeting the same resource.
    - id: peers
      forEach:
        - peer: ${identities.filter(i, i.identity == identity.value)}
      def:
        name: ${peer.name}
        priority: ${peer.priority}

    # The claim holder — sort by name (tiebreaker), then by priority
    # descending. Stable sort preserves name order within same
    # priority. Take first.
    - id: holder
      def:
        name: ${peers.sortBy(p, p.name).sortBy(p, -p.priority)[0].name}

    - id: target
      includeWhen:
        - ${holder.name == schema.metadata.name}
      template: "${schema.spec.template}"

    # Reflect Active + Claim onto the Singleton instance. Active ==
    # this Singleton currently holds the claim (is creating the target
    # resource). Claim is a human-readable identifier for the target,
    # format "<apiVersion>/<kind> <namespace>/<name>" for namespaced
    # targets, or "<apiVersion>/<kind> <name>" for cluster-scoped.
    - id: singletonStatus
      patch:
        apiVersion: ${schema.apiVersion}
        kind: ${schema.kind}
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        status:
          active: ${holder.name == schema.metadata.name}
          claim: >-
            ${schema.spec.template.apiVersion + "/" + schema.spec.template.kind + " "
              + (has(schema.spec.template.metadata.namespace) && schema.spec.template.metadata.namespace != ""
                 ? schema.spec.template.metadata.namespace + "/" : "")
              + schema.spec.template.metadata.name}
