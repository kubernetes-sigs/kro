# 5. A ResourceGraphDefinition that defines the WebApp kind
#
# What a platform engineer creates to define the WebApp abstraction.
# Example 3's RGD system watches these and creates a controller Graph per RGD.
# The per-instance controller evaluates the expressions in spec.resources.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: webapp-rgd
spec:
  schema:
    kind: WebApp
    apiVersion: v1alpha1
    group: kro.run
    spec:
      image: string | default=nginx
      replicas: integer | default=1
      port: integer | default=80
    status:
      deploymentReady: ${deployment.status.availableReplicas == deployment.spec.replicas}
      address: ${service.status.loadBalancer.ingress[0].hostname}
  resources:
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.metadata.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app: ${schema.metadata.name}
          template:
            metadata:
              labels:
                app: ${schema.metadata.name}
            spec:
              containers:
                - name: app
                  image: ${schema.spec.image}
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.metadata.name}-svc
        spec:
          selector:
            app: ${schema.metadata.name}
          ports:
            - port: ${schema.spec.port}
