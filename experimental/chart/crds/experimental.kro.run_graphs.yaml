apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: graphs.experimental.kro.run
spec:
  group: experimental.kro.run
  names:
    plural: graphs
    singular: graph
    kind: Graph
    listKind: GraphList
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Compiled
          type: string
          jsonPath: .status.conditions[?(@.type=="Compiled")].status
        - name: Message
          type: string
          priority: 1
          jsonPath: .status.conditions[?(@.type=="Ready")].message
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
