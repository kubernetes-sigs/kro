apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: graph-controller
rules:
  # Graph and GraphRevision — full CRUD
  - apiGroups: ["experimental.kro.run"]
    resources: ["graphs", "graphs/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["experimental.kro.run"]
    resources: ["graphrevisions", "graphrevisions/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Managed resources — the controller applies arbitrary resource types
  # via SSA. The specific types are determined at runtime by Graph specs.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  # Status subresource on managed resources (for Contribute templates)
  - apiGroups: ["*"]
    resources: ["*/status"]
    verbs: ["get", "patch"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
