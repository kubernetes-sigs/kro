# Singleton — declare a resource that should exist exactly once.
#
# A Kind whose per-instance Graph watches all peer Singletons and
# self-determines if it is the winner. Only the winner creates the
# target resource (via includeWhen gate).
#
# Priority resolution: highest spec.priority wins. Ties broken by
# lexicographically lowest metadata.name.
#
# Failover: when the winning Singleton is deleted, its per-instance
# Graph is torn down (target resource deleted). The remaining
# per-instance Graphs' peers WatchKind fires, includeWhen re-evaluates,
# and the new winner creates the resource.
#
# Complexity: each per-instance Graph watches all Singletons (O(N²)
# reconciliations per change). Acceptable — Singleton cardinality is
# small (typically 2-5 competing declarations per target resource).
#
# Per-instance Graph nodes:
#   - schema:     the Singleton instance (auto-injected by Kind controller)
#   - peers:      WatchKind on all Singletons
#   - identities: flatten each peer to {name, priority, identity}
#   - identity:   this Singleton's target identity
#   - candidates: peers targeting the same resource
#   - winner:     highest priority candidate (stable sort, take first)
#   - target:     the actual resource, only created if this Singleton won
# ─────────────────────────────────────────────────────────────────────
apiVersion: experimental.kro.run/v1alpha1
kind: Kind
metadata:
  name: singleton
  namespace: kro-system
spec:
  kind: Singleton
  group: experimental.kro.run
  version: v1alpha1
  schema:
    spec:
      priority: integer | default=0
      template: object
  nodes:
    - id: peers
      template:
        apiVersion: experimental.kro.run/v1alpha1
        kind: Singleton
        selector: {}

    # Flatten each peer into {name, priority, identity}.
    # The identity formula appears exactly once.
    - id: identities
      forEach:
        - peer: ${peers}
      template:
        name: ${peer.metadata.name}
        priority: ${peer.spec.priority}
        identity: >-
          ${peer.spec.template.apiVersion + "/" + peer.spec.template.kind + "/"
            + peer.spec.template.metadata.namespace + "/" + peer.spec.template.metadata.name}

    # This Singleton's target identity — same formula as identities.
    - id: identity
      template:
        value: >-
          ${schema.spec.template.apiVersion + "/" + schema.spec.template.kind + "/"
            + schema.spec.template.metadata.namespace + "/" + schema.spec.template.metadata.name}

    # Candidates targeting the same resource as me.
    - id: candidates
      forEach:
        - c: ${identities.filter(i, i.identity == identity.value)}
      template:
        name: ${c.name}
        priority: ${c.priority}

    # The winner — sort by name (tiebreaker), then by priority descending.
    # Stable sort preserves name order within same priority. Take first.
    - id: winner
      template:
        name: ${candidates.sortBy(c, c.name).sortBy(c, -c.priority)[0].name}

    - id: target
      includeWhen:
        - ${winner.name == schema.metadata.name}
      template: "${schema.spec.template}"
