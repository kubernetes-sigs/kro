apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: upgrade-mixed-nil-empty
spec:
  schema:
    apiVersion: v1alpha1
    kind: UpgradeMixedNilEmpty
    spec:
      name: string
    status: {}
  resources:
  # Resource with all optional fields explicitly set
  - id: full
    readyWhen: []
    includeWhen: []
    template:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ${schema.spec.name}-full
        namespace: ${schema.metadata.namespace}
      data:
        variant: full
  # Resource with all optional fields omitted (nil)
  - id: minimal
    template:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ${schema.spec.name}-minimal
        namespace: ${schema.metadata.namespace}
      data:
        variant: minimal
